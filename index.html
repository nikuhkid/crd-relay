<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Status</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #101214; color: #f2f5f7; }
    main { width: min(92vw, 560px); padding: 28px; }
    .label { color: #8d99a6; font-size: 14px; margin-bottom: 10px; }
    #value { font-size: clamp(36px, 10vw, 72px); line-height: 1; font-weight: 750; letter-spacing: .04em; word-break: break-word; }
    #updated { margin-top: 18px; color: #aab4bf; font-size: 14px; }
    button { margin-top: 24px; border: 1px solid #48515a; background: #1b2026; color: #f2f5f7; padding: 10px 14px; border-radius: 6px; cursor: pointer; }
    button:hover { background: #252b33; }
  </style>
</head>
<body>
  <main>
    <div class="label">Value</div>
    <div id="value">Empty</div>
    <div id="updated">Waiting.</div>
    <button id="copy" type="button">Copy</button>
  </main>
  <script>
    async function loadValue() {
      const response = await fetch(`code.json?ts=${Date.now()}`, { cache: 'no-store' });
      const data = await response.json();
      const value = data.code || 'Empty';
      document.getElementById('value').textContent = value;
      document.getElementById('updated').textContent = data.updated ? `Updated ${new Date(data.updated).toLocaleString()}` : 'Waiting.';
    }
    document.getElementById('copy').addEventListener('click', async () => {
      const text = document.getElementById('value').textContent.trim();
      if (text && text !== 'Empty') await navigator.clipboard.writeText(text);
    });
    loadValue();
    setInterval(loadValue, 15000);
  </script>
</body>
</html>
